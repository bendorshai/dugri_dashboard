{% extends "base.html" %}

{% block title %}דוגרי — הגדרה{% endblock %}

{% block body %}
<div class="onboarding-page">
    <div class="onboarding-card">
        <!-- Progress bar -->
        <div class="progress-bar">
            {% for i in range(1, total + 1) %}
            <div class="progress-step {% if i < step %}progress-step--done{% elif i == step %}progress-step--active{% endif %}"></div>
            {% endfor %}
        </div>

        {% block step_content %}{% endblock %}
    </div>
</div>
{% endblock %}
