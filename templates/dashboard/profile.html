{% extends "dashboard/layout.html" %}

{% block dashboard_content %}
<h1>פרטים אישיים</h1>

<form method="POST" action="{{ url_for('dashboard_views.profile_post') }}"
      x-data="{ gender: '{{ user.get('gender', '') or '' }}' }">
    <div class="card">
        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">
            הנתונים האלה עוזרים לדוגרי להציע לך יעדים מותאמים אישית. לא חובה למלא.
        </p>

        <div class="form-group">
            <label class="form-label" for="name">שם</label>
            <input class="form-input" type="text" id="name" name="name"
                   placeholder="איך לקרוא לך?"
                   value="{{ user.get('name', '') or '' }}">
        </div>

        <div class="form-group">
            <label class="form-label">מגדר</label>
            <div style="display: flex; gap: 1.5rem; margin-top: 0.25rem;">
                <label style="display: flex; align-items: center; gap: 0.4rem; cursor: pointer;">
                    <input type="radio" name="gender" value="male"
                           {{ 'checked' if user.get('gender') == 'male' else '' }}
                           @change="gender = 'male'">
                    בן
                </label>
                <label style="display: flex; align-items: center; gap: 0.4rem; cursor: pointer;">
                    <input type="radio" name="gender" value="female"
                           {{ 'checked' if user.get('gender') == 'female' else '' }}
                           @change="gender = 'female'">
                    בת
                </label>
                <label style="display: flex; align-items: center; gap: 0.4rem; cursor: pointer;">
                    <input type="radio" name="gender" value="other"
                           {{ 'checked' if user.get('gender') == 'other' else '' }}
                           @change="gender = 'other'">
                    אחר
                </label>
            </div>
        </div>

        <div class="form-group" x-show="gender === 'other'" x-cloak>
            <label class="form-label">לשון פנייה</label>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.5rem;">
                דוגרי חייב לבחור לשון פנייה - באיזו לשון לדבר איתך?
            </p>
            <div style="display: flex; gap: 1.5rem; margin-top: 0.25rem;">
                <label style="display: flex; align-items: center; gap: 0.4rem; cursor: pointer;">
                    <input type="radio" name="address_form" value="male"
                           {{ 'checked' if user.get('address_form') == 'male' else '' }}>
                    בן (זכר)
                </label>
                <label style="display: flex; align-items: center; gap: 0.4rem; cursor: pointer;">
                    <input type="radio" name="address_form" value="female"
                           {{ 'checked' if user.get('address_form') == 'female' else '' }}>
                    בת (נקבה)
                </label>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="birth_year">שנת לידה</label>
            <input class="form-input" type="number" id="birth_year" name="birth_year"
                   placeholder="לדוגמה: 1990"
                   value="{{ user.get('birth_year', '') or '' }}"
                   min="1930" max="2010">
        </div>

        <div class="form-group">
            <label class="form-label" for="weight_kg">משקל (ק"ג)</label>
            <input class="form-input" type="number" id="weight_kg" name="weight_kg"
                   placeholder="לדוגמה: 80"
                   value="{{ user.get('weight_kg', '') or '' }}"
                   min="30" max="300">
        </div>

        <div class="form-group">
            <label class="form-label" for="height_cm">גובה (ס"מ)</label>
            <input class="form-input" type="number" id="height_cm" name="height_cm"
                   placeholder="לדוגמה: 175"
                   value="{{ user.get('height_cm', '') or '' }}"
                   min="100" max="250">
        </div>
    </div>

    <button type="submit" class="btn btn--primary btn--full" style="margin-top: 1rem;">שמור שינויים</button>
</form>
{% endblock %}
