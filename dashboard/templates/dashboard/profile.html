{% extends "dashboard/layout.html" %}

{% block dashboard_content %}
<h1>פרטים אישיים</h1>

<form method="POST" action="{{ url_for('dashboard_views.profile_post') }}">
    <div class="card">
        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">
            הנתונים האלה עוזרים לדוגרי להציע לך יעדים מותאמים אישית. לא חובה למלא.
        </p>

        <div class="form-group">
            <label class="form-label" for="birth_year">שנת לידה</label>
            <input class="form-input" type="number" id="birth_year" name="birth_year"
                   placeholder="לדוגמה: 1990"
                   value="{{ user.get('birth_year', '') or '' }}"
                   min="1930" max="2010">
        </div>

        <div class="form-group">
            <label class="form-label" for="weight_kg">משקל (ק"ג)</label>
            <input class="form-input" type="number" id="weight_kg" name="weight_kg"
                   placeholder="לדוגמה: 80"
                   value="{{ user.get('weight_kg', '') or '' }}"
                   min="30" max="300">
        </div>

        <div class="form-group">
            <label class="form-label" for="height_cm">גובה (ס"מ)</label>
            <input class="form-input" type="number" id="height_cm" name="height_cm"
                   placeholder="לדוגמה: 175"
                   value="{{ user.get('height_cm', '') or '' }}"
                   min="100" max="250">
        </div>
    </div>

    <button type="submit" class="btn btn--primary btn--full" style="margin-top: 1rem;">שמור שינויים</button>
</form>
{% endblock %}
